services:
  - type: web
    name: xenoai-crm
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHANNEL_SERVICE_URL
        sync: false
      - key: CRM_CALLBACK_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000

  - type: web
    name: xenoai-channel
    env: node
    rootDir: ../channel
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4001
